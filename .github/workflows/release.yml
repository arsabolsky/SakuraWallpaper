name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install create-dmg
          pip3 install Pillow --break-system-packages

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in build.sh
        run: sed -i '' "s/APP_VERSION=\".*\"/APP_VERSION=\"${{ steps.version.outputs.VERSION }}\"/" build.sh

      - name: Build DMG
        run: ./build.sh dmg

      - name: Compute SHA256
        id: sha
        run: echo "SHA256=$(shasum -a 256 SakuraWallpaper.dmg | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SakuraWallpaper ${{ github.ref_name }}"
          body: |
            ## SakuraWallpaper ${{ github.ref_name }}

            ### Install
            Download `SakuraWallpaper.dmg` below, open it, and drag the app to Applications.

            > **Note**: The app is unsigned. If macOS blocks it, run this in Terminal after installing:
            > ```
            > xattr -cr /Applications/SakuraWallpaper.app
            > ```

            ### Homebrew
            ```
            brew install --cask yueseqaz/tap/sakura-wallpaper
            ```

            ---
            **SHA256**: `${{ steps.sha.outputs.SHA256 }}`
          files: SakuraWallpaper.dmg
          draft: false
          prerelease: false

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA256: ${{ steps.sha.outputs.SHA256 }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/yueseqaz/homebrew-tap.git
          cd homebrew-tap
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/sakura-wallpaper.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/sakura-wallpaper.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/sakura-wallpaper.rb
          git commit -m "chore: update sakura-wallpaper to v${VERSION}"
          git push
